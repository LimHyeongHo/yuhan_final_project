<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>결제 완료</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
        }
        .success-icon { font-size: 60px; margin-bottom: 20px; }
        .card {
            background-color: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }
        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
            font-size: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        .result-item:last-child { border-bottom: none; }
        .highlight {
            font-weight: bold;
            color: #3182f6;
            font-size: 18px;
        }
        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
        }
        .paid { background-color: #e8f5e9; color: #2e7d32; }
        .waiting { background-color: #fff3e0; color: #e65100; }
        .cancelled { background-color: #ffebee; color: #c62828; }
        .cancel-btn {
            background: none;
            border: 1px solid #ff5252;
            color: #ff5252;
            padding: 4px 10px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 8px;
        }
        .cancel-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }
        button.main-btn {
            width: 100%;
            padding: 12px;
            background-color: #3182f6;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
<div class="success-icon">✅</div>
<h2>결제가 완료됐어요!</h2>

<div class="card">
    <div class="result-item">
        <span>주문명</span>
        <span id="orderName"></span>
    </div>
    <div class="result-item">
        <span>총 결제금액</span>
        <span id="totalAmount" class="highlight"></span>
    </div>
    <div class="result-item">
        <span>참여 인원</span>
        <span id="participants"></span>
    </div>
    <div class="result-item">
        <span>1인당 금액</span>
        <span id="perPerson" class="highlight"></span>
    </div>
    <div class="result-item">
        <span>잔돈 (대표자 부담)</span>
        <span id="remainder"></span>
    </div>
</div>

<div class="card">
    <h3 style="margin-top:0">💰 정산 현황</h3>
    <div class="result-item">
        <span>대표자 (나)</span>
        <span class="status-badge paid">결제완료</span>
    </div>
    <div id="participantList"></div>
</div>

<button class="main-btn" onclick="location.href='/payment.html'">
    새 주문 만들기
</button>

<script>
    const params = new URLSearchParams(window.location.search);
    let totalAmount = Number(params.get("amount") || 0);
    let participants = Number(params.get("participants") || 4);
    const orderName = params.get("orderName") || "공동주문";

    // 참여자 상태 관리
    let participantStatus = [];
    for (let i = 1; i < participants; i++) {
        participantStatus.push({ id: i, name: "참여자 " + i, cancelled: false });
    }

    function updateDisplay(perPerson, remainder, currentParticipants) {
        document.getElementById("orderName").innerText = orderName;
        document.getElementById("totalAmount").innerText =
            totalAmount.toLocaleString() + "원";
        document.getElementById("participants").innerText =
            currentParticipants + "명";
        document.getElementById("perPerson").innerText =
            Number(perPerson).toLocaleString() + "원";
        document.getElementById("remainder").innerText =
            Number(remainder).toLocaleString() + "원";
    }

    function renderParticipants() {
        const list = document.getElementById("participantList");
        list.innerHTML = "";

        participantStatus.forEach((p) => {
            const div = document.createElement("div");
            div.className = "result-item";

            if (p.cancelled) {
                div.innerHTML = `
                        <span>${p.name}</span>
                        <span class="status-badge cancelled">취소됨</span>
                    `;
            } else {
                div.innerHTML = `
                        <span>${p.name}</span>
                        <span>
                            <span class="status-badge waiting">입금대기</span>
                            <button class="cancel-btn" onclick="cancelParticipant(${p.id})">취소</button>
                        </span>
                    `;
            }
            list.appendChild(div);
        });
    }

    async function cancelParticipant(id) {
        const activeCount = participantStatus.filter(p => !p.cancelled).length;

        if (activeCount <= 1) {
            alert("참여자가 1명 이하면 취소할 수 없어요!");
            return;
        }

        if (!confirm("취소하면 금액이 재계산돼요. 진행할까요?")) return;

        const response = await fetch(
            `/api/payment/cancel?totalAmount=${totalAmount}&currentParticipants=${activeCount + 1}`
            , { method: "POST" });

        const data = await response.json();

        // 취소된 참여자 상태 변경
        participantStatus = participantStatus.map(p =>
            p.id === id ? { ...p, cancelled: true } : p
        );

        // 화면 업데이트
        updateDisplay(data.perPerson, data.remainder, data.participants);
        renderParticipants();
    }

    // 초기 계산
    const perPerson = Math.floor(totalAmount / participants);
    const remainder = totalAmount % participants;
    updateDisplay(perPerson, remainder, participants);
    renderParticipants();
</script>
</body>
</html>
