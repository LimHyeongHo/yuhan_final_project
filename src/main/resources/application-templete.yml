spring:
  application:
    name: payment
  h2:
    console:
      enabled: true
  datasource:
    url: jdbc:h2:mem:testdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: true

app:
  base-url: http://localhost:8080

toss:
  client-key: YOUR_CLIENT_KEY_HERE
  secret-key: YOUR_SECRET_KEY_HERE
