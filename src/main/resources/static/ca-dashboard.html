<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>CA 인증서 대시보드</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 50px auto;
            padding: 20px;
        }
        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            background-color: #f0f0f0;
            color: #333;
        }
        .tab-btn.active {
            background-color: #3182f6;
            color: white;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .card {
            background-color: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin: 15px 0;
        }
        .cert-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
            font-size: 15px;
            border-bottom: 1px solid #eee;
            padding-bottom: 10px;
        }
        .cert-item:last-child { border-bottom: none; }
        .label { color: #666; }
        .value { font-weight: bold; color: #3182f6; }
        .valid {
            background-color: #e8f5e9;
            color: #2e7d32;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 13px;
        }
        .step {
            display: flex;
            align-items: flex-start;
            margin: 15px 0;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.5s ease;
        }
        .step.show {
            opacity: 1;
            transform: translateY(0);
        }
        .step-num-success {
            background-color: #3182f6;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
            flex-shrink: 0;
        }
        .step-num-fail {
            background-color: #ff5252;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            margin-right: 15px;
            flex-shrink: 0;
        }
        .step-box-success {
            background-color: #e8f5e9;
            border-radius: 10px;
            padding: 15px;
            flex: 1;
        }
        .step-box-fail {
            background-color: #ffebee;
            border-radius: 10px;
            padding: 15px;
            flex: 1;
        }
        .step-title { font-weight: bold; margin-bottom: 5px; }
        .step-desc { font-size: 14px; color: #666; }
        .action-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 15px;
            margin-bottom: 15px;
            color: white;
        }
        .btn-blue { background-color: #3182f6; }
        .btn-red { background-color: #ff5252; }
        #verify-result, #expired-result {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>
<h2>🔒 CA 인증서 대시보드</h2>

<!-- 탭 버튼 -->
<div class="tab-buttons">
    <button class="tab-btn active" onclick="showTab('cert')">📋 인증서 정보</button>
    <button class="tab-btn" onclick="showTab('verify')">🔍 검증 과정</button>
    <button class="tab-btn" onclick="showTab('expired')">⚠️ 만료 시뮬레이션</button>
</div>

<!-- 탭 1: 인증서 정보 -->
<div id="tab-cert" class="tab-content active">
    <div class="card">
        <h3 style="margin-top:0">📋 서버 인증서 상세</h3>
        <div class="cert-item">
            <span class="label">주체 (Subject)</span>
            <span class="value" id="subject"></span>
        </div>
        <div class="cert-item">
            <span class="label">발급자 (Issuer)</span>
            <span class="value" id="issuer"></span>
        </div>
        <div class="cert-item">
            <span class="label">유효 시작일</span>
            <span class="value" id="validFrom"></span>
        </div>
        <div class="cert-item">
            <span class="label">유효 만료일</span>
            <span class="value" id="validTo"></span>
        </div>
        <div class="cert-item">
            <span class="label">서명 알고리즘</span>
            <span class="value" id="algorithm"></span>
        </div>
        <div class="cert-item">
            <span class="label">키 길이</span>
            <span class="value" id="keyLength"></span>
        </div>
        <div class="cert-item">
            <span class="label">일련번호</span>
            <span class="value" id="serialNumber"></span>
        </div>
        <div class="cert-item">
            <span class="label">버전</span>
            <span class="value" id="version"></span>
        </div>

        <div class="cert-item">
            <span class="label">상태</span>
            <span class="valid">✅ 유효함</span>
        </div>
    </div>
    <div class="card">
        <h3 style="margin-top:0">🏛️ CA 정보</h3>
        <p>이 인증서는 <strong>Yuhan Root CA</strong>에서 발급했습니다.</p>
        <p>openssl로 직접 생성한 모의 CA입니다.</p>
    </div>
</div>

<!-- 탭 2: 검증 과정 -->
<div id="tab-verify" class="tab-content">
    <button class="action-btn btn-blue" onclick="startVerify()">🔍 검증 시작</button>
    <div id="verify-steps"></div>
    <div id="verify-result" style="color:#2e7d32">✅ 인증서 검증 완료! 암호화 통신 시작</div>
</div>

<!-- 탭 3: 만료 시뮬레이션 -->
<div id="tab-expired" class="tab-content">
    <button class="action-btn btn-red" onclick="startExpired()">⚠️ 만료 시뮬레이션 시작</button>
    <div id="expired-steps"></div>
    <div id="expired-result" style="color:#c62828">❌ 인증서 만료! 암호화 통신 불가</div>
</div>

<script>
    // 탭 전환
    function showTab(tab) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
        event.target.classList.add('active');
    }

    // 인증서 정보 로드
    async function loadCertInfo() {
        const response = await fetch('/api/payment/cert-info');
        const data = await response.json();
        document.getElementById("subject").innerText = data.subject;
        document.getElementById("issuer").innerText = data.issuer;
        document.getElementById("validFrom").innerText = data.validFrom;
        document.getElementById("validTo").innerText = data.validTo;
        document.getElementById("algorithm").innerText = data.algorithm;
        document.getElementById("keyLength").innerText = data.keyLength;
        document.getElementById("serialNumber").innerText = data.serialNumber;
        document.getElementById("version").innerText = data.version;
    }

    // 검증 과정
    async function startVerify() {
        const response = await fetch('/api/payment/cert-verify');
        const steps = await response.json();
        const container = document.getElementById("verify-steps");
        container.innerHTML = "";
        document.getElementById("verify-result").style.display = "none";
        renderSteps(steps, container, "verify-result");
    }

    // 만료 시뮬레이션 → 실제 인증서 읽어서 보여주기
    async function startExpired() {
        const response = await fetch('/api/payment/cert-expired');
        const data = await response.json();

        const container = document.getElementById("expired-steps");
        container.innerHTML = "";
        document.getElementById("expired-result").style.display = "none";

        const isExpired = data.expired;

        const info = [
            { step: "1", title: "만료된 인증서 정보", description: "주체: " + data.subject, status: "success" },
            { step: "2", title: "발급자 확인", description: "발급자: " + data.issuer, status: "success" },
            { step: "3", title: "유효기간 확인", description: "만료일: " + data.validTo, status: isExpired ? "fail" : "success" },
            { step: "4", title: "만료 상태", description: "상태: " + data.status, status: isExpired ? "fail" : "success" },
            { step: "5", title: isExpired ? "통신 차단" : "통신 정상", description: isExpired ? "만료된 인증서로는 암호화 통신 불가" : "유효한 인증서로 암호화 통신 가능", status: isExpired ? "fail" : "success" }
        ];

        renderSteps(info, container, "expired-result");

        // 결과 메시지도 실제 상태에 따라 변경
        const resultDiv = document.getElementById("expired-result");
        resultDiv.style.color = isExpired ? "#c62828" : "#2e7d32";
        resultDiv.innerText = isExpired ? "❌ 인증서 만료! 암호화 통신 불가" : "✅ 인증서 유효! 암호화 통신 가능";
    }
    // 단계 렌더링
    function renderSteps(steps, container, resultId) {
        steps.forEach((step, index) => {
            const div = document.createElement("div");
            div.className = "step";
            const isSuccess = step.status === "success";
            div.innerHTML = `
                    <div class="${isSuccess ? 'step-num-success' : 'step-num-fail'}">${step.step}</div>
                    <div class="${isSuccess ? 'step-box-success' : 'step-box-fail'}">
                        <div class="step-title">${step.title}</div>
                        <div class="step-desc">${step.description}</div>
                    </div>
                `;
            container.appendChild(div);
            setTimeout(() => {
                div.classList.add("show");
                if (index === steps.length - 1) {
                    setTimeout(() => {
                        document.getElementById(resultId).style.display = "block";
                    }, 500);
                }
            }, index * 800);
        });
    }

    loadCertInfo();
</script>
</body>
</html>
