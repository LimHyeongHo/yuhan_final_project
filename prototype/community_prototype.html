<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>YU-BOOK | 자유 게시판</title>
    <link rel="stylesheet" href="css/common.css">
    <style>
        /* 고객센터 게시판(board_prototype)의 CSS 완벽 동일 활용 */
        .board-wrapper { max-width: 1200px; margin: 60px auto 80px auto; padding: 0 20px; }
        .board-title { font-size: 28px; font-weight: 700; text-align: center; margin-bottom: 40px; color: #333; }
        .board-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; font-size: 14px; color: #555; }
        .btn-write { padding: 10px 20px; background-color: #00796b; color: #fff; border: none; border-radius: 4px; font-weight: 700; cursor: pointer; }
        
        .board-table { width: 100%; border-collapse: collapse; border-top: 2px solid #333; margin-bottom: 40px; }
        .board-table th { background-color: #f9f9f9; padding: 15px 10px; border-bottom: 1px solid #ddd; font-size: 15px; }
        .board-table td { padding: 15px 10px; text-align: center; border-bottom: 1px solid #eee; font-size: 14px; color: #555; }
        .board-table .col-title { text-align: left; padding-left: 20px; }
        .board-table .col-title a { color: #333; font-weight: 500; }
        .board-table .col-title a:hover { text-decoration: underline; color: #00796b; }
    </style>
</head>

                <tr>
                    <td>341</td>
